name: Security

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86"
      - name: Install cargo-audit
        run: cargo install cargo-audit@0.22.1 --locked
      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0009
        # RUSTSEC-2023-0071 (rsa 0.9.10, medium 5.9): pulled transitively via
        #   sqlx-mysql, a target-specific dep. Rungu uses SQLite only — rsa is
        #   never compiled in. No fixed upgrade available upstream.
        # RUSTSEC-2026-0009 (time 0.3.41, medium 6.8): pinned below 0.3.47 to
        #   satisfy MSRV 1.86 (rust-toolchain.toml). time 0.3.47+ requires
        #   rustc 1.88. Unpin when project MSRV bumps to 1.88.

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=moderate

  trivy-fs:
    name: Trivy Filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  trivy-secrets:
    name: Trivy Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          exit-code: '1'
